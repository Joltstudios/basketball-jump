<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Basketball Jump: Pro Edition</title>
    <style>
        :root { --primary: #e67e22; --body-bg: #2c3e50; }
        html, body { margin: 0; padding: 0; overflow: hidden; background: var(--body-bg); font-family: sans-serif; touch-action: none; width: 100%; height: 100%; }
        #app-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { display: block; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        .overlay { position: absolute; background: white; padding: 20px; border-radius: 20px; text-align: center; display: none; flex-direction: column; width: 80%; max-width: 300px; z-index: 10; border: 4px solid var(--primary); }
        .save-toast { position: absolute; top: 10%; background: #2ecc71; color: white; padding: 10px 20px; border-radius: 20px; z-index: 20; }
        button { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .shop-grid { height: 150px; overflow-y: auto; border: 1px solid #ccc; margin: 10px 0; }
    </style>
</head>
<body>

<div id="app-container">
    <canvas id="gameCanvas"></canvas>
    <div id="saveToast" class="save-toast" style="display:none;">💾 PROGRESS SAVED</div>
    <div id="hud" style="position:absolute; top:20px; left:20px; color:white; z-index:5;">💰 <span id="coinVal">150</span></div>
    
    <div id="login-screen" class="overlay" style="display:flex;">
        <h1>BASKETBALL JUMP</h1>
        <input type="text" id="nickInput" placeholder="NICKNAME">
        <button onclick="saveNickname()" style="background:var(--primary); color:white;">START</button>
    </div>

    <div id="menu" class="overlay">
        <h2>GAME OVER</h2>
        <button onclick="startGame()" style="background:#2ecc71; color:white;">REPLAY</button>
        <button onclick="openShop()" style="background:#3498db; color:white;">🛒 SHOP</button>
    </div>

    <div id="shop-screen" class="overlay">
        <h2>SHOP</h2>
        <div id="shopGrid" class="shop-grid"></div>
        <button onclick="closeShop()">CLOSE</button>
    </div>
</div>

<script>
    // Game Variables
    let coins = 150, score = 0, highScore = 0, gameActive = false;
    let player = { x: 60, y: 300, radius: 18, v: 0, g: 0.45, jump: -7.5 };
    let purchasedCourts = ['classicWood'], activeCourtKey = 'classicWood';

    // Data Management
    function persistData() {
        const data = JSON.stringify({ coins, highScore, purchasedCourts, activeCourtKey });
        localStorage.setItem('gameSave', data);
        localStorage.setItem('gameBackup', data);
        const toast = document.getElementById('saveToast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    function loadData() {
        const data = localStorage.getItem('gameSave') || localStorage.getItem('gameBackup');
        if (data) {
            const p = JSON.parse(data);
            coins = p.coins; highScore = p.highScore; purchasedCourts = p.purchasedCourts; activeCourtKey = p.activeCourtKey;
        }
    }

    // Engine
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function update() {
        if (!gameActive) return;
        player.v += player.g; player.y += player.v;
        if (player.y > canvas.height || player.y < 0) endGame();
        
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "orange";
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
        requestAnimationFrame(update);
    }

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        player.y = 300; player.v = 0; gameActive = true; update();
    }

    function endGame() {
        gameActive = false;
        if (score > highScore) highScore = score;
        persistData(); // Robust Auto-Save triggered
        document.getElementById('menu').style.display = 'flex';
    }

    function saveNickname() {
        localStorage.setItem('playerNick', document.getElementById('nickInput').value);
        location.reload();
    }

    function openShop() { document.getElementById('menu').style.display = 'none'; document.getElementById('shop-screen').style.display = 'flex'; }
    function closeShop() { document.getElementById('shop-screen').style.display = 'none'; document.getElementById('menu').style.display = 'flex'; }

    window.onload = () => { loadData(); document.getElementById('coinVal').innerText = coins; };
    window.addEventListener('mousedown', () => { if(gameActive) player.v = player.jump; });
</script>
</body>
</html>
