<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Basketball Jump: Pro Edition</title>
    <style>
        :root { 
            --primary: #e67e22; 
            --gold: #f1c40f; 
            --wood: #d35400; 
            --rim: #e74c3c; 
            --bg-color: #222;
            --body-bg: radial-gradient(circle, #34495e 0%, #2c3e50 100%);
        }
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--body-bg); 
            font-family: 'Segoe UI', sans-serif; touch-action: none; 
            position: fixed; width: 100%; height: 100%; 
        }
        #app-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { display: block; max-width: 100%; max-height: 100vh; margin: 0 auto; z-index: 1; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        .overlay { position: absolute; background: white; padding: 25px; border-radius: 25px; text-align: center; display: none; flex-direction: column; width: 85%; max-width: 320px; z-index: 10; border: 4px solid var(--primary); box-shadow: 0 15px 40px rgba(0,0,0,0.4); box-sizing: border-box; }
        #login-screen { display: flex; }
        input[type="text"] { padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; width: 85%; text-align: center; margin-left: auto; margin-right: auto; outline: none; }
        
        button { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; text-transform: uppercase; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:active { transform: scale(0.96); }
        button:disabled { background: #bdc3c7 !important; color: #7f8c8d !important; cursor: not-allowed; }
        
        .btn-start { background: var(--primary); color: white; }
        .btn-restart { background: #2ecc71; color: white; }
        .btn-ad { background: #9b59b6; color: white; }
        .btn-shop { background: #3498db; color: white; }
        .btn-exit { background: #95a5a6; color: white; }
        
        .leaderboard-list { text-align: left; margin: 10px 0; font-size: 13px; background: #f9f9f9; padding: 10px; border-radius: 10px; min-height: 90px; border: 1px solid #eee; }
        .score-entry { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 4px 2px; }
        
        #hud { position: absolute; top: env(safe-area-inset-top, 20px); width: 90%; display: flex; justify-content: space-between; color: white; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 5; font-size: 18px; }
        
        /* Expanded Shop Layout with 3 Tabs */
        .shop-tabs { display: flex; gap: 4px; margin-top: 10px; }
        .tab-btn { flex: 1; padding: 8px 4px; font-size: 11px; background: #eee; color: #333; border-radius: 8px; white-space: nowrap; }
        .tab-btn.active { background: #3498db; color: white; }
        
        .shop-grid { display: flex; flex-direction: column; gap: 10px; max-height: 220px; overflow-y: auto; margin: 15px 0; padding-right: 5px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 2px solid #eee; border-radius: 10px; background: #fafafa; }
        .shop-item.active { border-color: #2ecc71; background: #e8f8f5; }
        .item-info { text-align: left; }
        .item-name { font-weight: bold; font-size: 14px; }
        .item-cost { font-size: 12px; color: #7f8c8d; }
        .btn-buy { padding: 6px 12px; font-size: 12px; margin-top: 0; }

        /* Simulated Ad Player Screen */
        #ad-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .ad-box { width: 80%; max-width: 400px; height: 250px; background: #333; border: 2px dashed #666; display: flex; align-items: center; justify-content: center; border-radius: 15px; margin-bottom: 20px; font-size: 24px; color: #aaa; position: relative; overflow: hidden; }
        .ad-progress { position: absolute; bottom: 0; left: 0; height: 6px; background: #e74c3c; width: 0%; }
    </style>
</head>
<body>

<div id="app-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">
        <div id="playerDisplay">PLAYER</div>
        <div>💰 <span id="coinVal">0</span></div>
    </div>

    <div id="login-screen" class="overlay">
        <h1 style="color:var(--primary); margin:0; font-size: 32px; letter-spacing: -1px;">BASKETBALL JUMP</h1>
        <p style="color: #666; margin-top: 5px;">Enter nickname to play</p>
        <input type="text" id="nickInput" placeholder="NICKNAME" maxlength="12">
        <button class="btn-start" onclick="saveNickname()">START GAME</button>
    </div>

    <div id="menu" class="overlay">
        <h2 id="menuTitle" style="margin-top:0; color:#c0392b;">OUT OF BOUNDS!</h2>
        
        <div class="leaderboard-list" id="leaderboardContainer">
            <strong>TOP 5 LEADERBOARD</strong>
        </div>

        <p style="font-size: 15px; margin: 5px 0;">Your Run: <strong><span id="lastScore">0</span></strong></p>
        
        <button class="btn-restart" onclick="startGame()">REPLAY</button>
        <button class="btn-ad" id="btnReviveAd" onclick="watchAd('revive')">📺 REVIVE RUN</button>
        <button class="btn-shop" onclick="openShop()">🛒 THEME SHOP</button>
        <button class="btn-ad" id="btnFreeCoins" onclick="watchAd('coins')">📺 FREE COINS (+10)</button>
        <button class="btn-exit" onclick="fullExit()">EXIT TO MAIN</button>
    </div>

    <div id="shop-screen" class="overlay">
        <h2 style="margin-top: 0; color: #3498db; margin-bottom: 5px;">THEME SHOP</h2>
        <p style="margin: 0; font-size: 14px; color: #666;">Balance: 💰 <span id="shopCoinVal">0</span></p>
        
        <div class="shop-tabs">
            <button id="tabCourts" class="tab-btn active" onclick="switchShopTab('courts')">🏟️ COURTS</button>
            <button id="tabBalls" class="tab-btn" onclick="switchShopTab('balls')">🏀 BALLS</button>
            <button id="tabPillars" class="tab-btn" onclick="switchShopTab('pillars')">🚧 PILLARS</button>
        </div>
        
        <div class="shop-grid" id="shopGrid">
            </div>
        
        <button class="btn-exit" onclick="closeShop()">CLOSE SHOP</button>
    </div>

    <div id="ad-container">
        <h3 style="margin: 0 0 10px 0; letter-spacing: 1px;">SPONSORED ADVERTISEMENT</h3>
        <div class="ad-box">
            <span id="adContent">🎥 Commercial Playing...</span>
            <div class="ad-progress" id="adBar"></div>
        </div>
        <p id="adTimer">Reward arrives in 5 seconds...</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let nickname = localStorage.getItem('playerNick') || "";
    let coins = parseInt(localStorage.getItem('coins')) || 0;
    let highScore = localStorage.getItem('bestScore') || 0;
    let gameActive = false, score = 0, frame = 0, obstacleCount = 0;
    let hasRevivedThisRun = false;
    let currentAdAction = null;
    let currentShopTab = 'courts'; 

    let player = { x: 60, y: 0, radius: 18, v: 0, g: 0.45, jump: -7.5 };
    let obstacles = [], coinItems = [];

    // --- 1. Separated Cosmetics Databases (Costs dynamically assigned now) ---
    const courtThemes = {
        classicWood: { name: "Classic Wood", court: "#e67e22", lines: "rgba(255,255,255,0.5)", bodyBg: "radial-gradient(circle, #34495e 0%, #2c3e50 100%)" },
        neonCyber: { name: "Neon Cyber", court: "#0d0e15", lines: "#00f0ff", bodyBg: "linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)" },
        matrixNet: { name: "The Matrix", court: "#000000", lines: "#00FF00", bodyBg: "linear-gradient(180deg, #001100 0%, #000000 100%)" },
        royalCourt: { name: "Royal Arena", court: "#1a252f", lines: "#f1c40f", bodyBg: "linear-gradient(135deg, #b89742 0%, #efd07b 50%, #b89742 100%)" }
    };

    const ballThemes = {
        orangeSpald: { name: "Spalding Orange", primary: "#d35400", seam: "black" },
        neonPink: { name: "Cyber Punk Pink", primary: "#ff007f", seam: "#00f0ff" },
        matrixGreen: { name: "Digital Lime", primary: "#39ff14", seam: "#000000" },
        solidGold: { name: "Solid Trophy Gold", primary: "#f1c40f", seam: "#ffffff" }
    };

    const pillarThemes = {
        slateGray: { name: "Standard Slate", fill: "#34495e", rim: "#e74c3c" },
        cyberGrid: { name: "Neon Grid Tower", fill: "#1f1f2e", rim: "#00f0ff" },
        toxicWaste: { name: "Toxic Barrel", fill: "#1a3a1a", rim: "#39ff14" },
        gildedBars: { name: "Gilded Gold Bars", fill: "#7f6000", rim: "#f1c40f" }
    };
    
    // 2. Independent Inventory Lists 
    let purchasedCourts = JSON.parse(localStorage.getItem('purchasedCourts')) || ['classicWood'];
    let purchasedBalls = JSON.parse(localStorage.getItem('purchasedBalls')) || ['orangeSpald'];
    let purchasedPillars = JSON.parse(localStorage.getItem('purchasedPillars')) || ['slateGray'];
    
    // 3. Active Custom Selections
    let activeCourtKey = localStorage.getItem('activeCourtKey') || 'classicWood';
    let activeBallKey = localStorage.getItem('activeBallKey') || 'orangeSpald';
    let activePillarKey = localStorage.getItem('activePillarKey') || 'slateGray';

    function init() {
        canvas.height = window.innerHeight;
        canvas.width = Math.min(window.innerWidth, canvas.height * 0.6);
        applyThemeStyles();
        
        if (nickname) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('playerDisplay').innerText = nickname.toUpperCase();
            document.getElementById('menuTitle').innerText = "READY TO JUMP?";
            document.getElementById('btnReviveAd').style.display = 'none';
        }
        updateHUD(); 
        displayLeaderboard();
        checkAdLimit();
        render();
    }

    function saveNickname() {
        const input = document.getElementById('nickInput').value.trim();
        if (input.length < 2) return alert("Too short!");
        nickname = input; 
        localStorage.setItem('playerNick', nickname); 
        location.reload();
    }

    function fullExit() {
        localStorage.removeItem('playerNick');
        location.reload();
    }

    function updateHUD() { 
        document.getElementById('coinVal').innerText = coins; 
        document.getElementById('shopCoinVal').innerText = coins; 
    }

    function applyThemeStyles() {
        const court = courtThemes[activeCourtKey];
        const ball = ballThemes[activeBallKey];
        document.documentElement.style.setProperty('--body-bg', court.bodyBg);
        document.documentElement.style.setProperty('--primary', ball.primary);
    }

    // --- Daily Ad Tracking Check ---
    function getAdCountForToday() {
        const today = new Date().toDateString();
        const savedDate = localStorage.getItem('adTrackerDate');
        
        if (savedDate !== today) {
            localStorage.setItem('adTrackerDate', today);
            localStorage.setItem('adCountToday', '0');
            return 0;
        }
        return parseInt(localStorage.getItem('adCountToday')) || 0;
    }

    function incrementAdCount() {
        const currentCount = getAdCountForToday();
        localStorage.setItem('adCountToday', (currentCount + 1).toString());
        checkAdLimit();
    }

    function checkAdLimit() {
        const btn = document.getElementById('btnFreeCoins');
        const count = getAdCountForToday();
        if (count >= 10) {
            btn.disabled = true;
            btn.innerText = "📺 FREE COINS (MAXED)";
        } else {
            btn.disabled = false;
            btn.innerText = `📺 FREE COINS (+10) [${count}/10]`;
        }
    }

    // --- Dynamic Formula Shopping Engine ---
    function getThemeCost(key, tab) {
        // Default items cost 0
        if (key === 'classicWood' || key === 'orangeSpald' || key === 'slateGray') return 0;
        
        let ownedCount = 0;
        if (tab === 'courts') {
            // Count purchased premium courts (excluding default classicWood)
            ownedCount = purchasedCourts.filter(k => k !== 'classicWood').length;
        } else if (tab === 'balls') {
            ownedCount = purchasedBalls.filter(k => k !== 'orangeSpald').length;
        } else {
            ownedCount = purchasedPillars.filter(k => k !== 'slateGray').length;
        }
        
        // Starts at 500 and scales up by 150 per purchased item in that collection
        return 500 + (ownedCount * 150);
    }

    function openShop() {
        document.getElementById('menu').style.display = 'none';
        switchShopTab(currentShopTab);
        document.getElementById('shop-screen').style.display = 'flex';
        updateHUD();
    }

    function switchShopTab(tab) {
        currentShopTab = tab;
        
        document.getElementById('tabCourts').classList.toggle('active', tab === 'courts');
        document.getElementById('tabBalls').classList.toggle('active', tab === 'balls');
        document.getElementById('tabPillars').classList.toggle('active', tab === 'pillars');
        
        const grid = document.getElementById('shopGrid');
        grid.innerHTML = '';
        
        let targetDatabase, ownedInventory, currentlyEquipped;
        if (tab === 'courts') {
            targetDatabase = courtThemes; ownedInventory = purchasedCourts; currentlyEquipped = activeCourtKey;
        } else if (tab === 'balls') {
            targetDatabase = ballThemes; ownedInventory = purchasedBalls; currentlyEquipped = activeBallKey;
        } else {
            targetDatabase = pillarThemes; ownedInventory = purchasedPillars; currentlyEquipped = activePillarKey;
        }

        Object.keys(targetDatabase).forEach(key => {
            const item = targetDatabase[key];
            const isOwned = ownedInventory.includes(key);
            const isActive = currentlyEquipped === key;
            const dynamicCost = getThemeCost(key, tab);
            
            let actionBtn = '';
            if (isActive) {
                actionBtn = `<button class="btn-buy" style="background:#2ecc71; color:white;" disabled>EQUIPPED</button>`;
            } else if (isOwned) {
                actionBtn = `<button class="btn-buy" style="background:#3498db; color:white;" onclick="equipItem('${key}', '${tab}')">EQUIP</button>`;
            } else {
                actionBtn = `<button class="btn-buy" style="background:#f1c40f; color:#222;" onclick="buyItem('${key}', '${tab}')">💰 ${dynamicCost}</button>`;
            }

            grid.innerHTML += `
                <div class="shop-item ${isActive ? 'active' : ''}">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-cost">${isOwned ? 'Unlocked' : 'Custom Skin'}</div>
                    </div>
                    ${actionBtn}
                </div>
            `;
        });
    }

    function buyItem(key, tab) {
        const cost = getThemeCost(key, tab);
        
        if (coins >= cost) {
            coins -= cost;
            localStorage.setItem('coins', coins);
            
            if (tab === 'courts') {
                purchasedCourts.push(key);
                localStorage.setItem('purchasedCourts', JSON.stringify(purchasedCourts));
            } else if (tab === 'balls') {
                purchasedBalls.push(key);
                localStorage.setItem('purchasedBalls', JSON.stringify(purchasedBalls));
            } else {
                purchasedPillars.push(key);
                localStorage.setItem('purchasedPillars', JSON.stringify(purchasedPillars));
            }
            
            equipItem(key, tab);
        } else {
            alert("Not enough coins! Watch an ad to get some free coins.");
        }
    }

    function equipItem(key, tab) {
        if (tab === 'courts') {
            activeCourtKey = key;
            localStorage.setItem('activeCourtKey', activeCourtKey);
        } else if (tab === 'balls') {
            activeBallKey = key;
            localStorage.setItem('activeBallKey', activeBallKey);
        } else {
            activePillarKey = key;
            localStorage.setItem('activePillarKey', activePillarKey);
        }
        applyThemeStyles();
        switchShopTab(tab);
    }

    function closeShop() {
        document.getElementById('shop-screen').style.display = 'none';
        document.getElementById('menu').style.display = 'flex';
    }

    // --- Mock Ad Mechanism Engine ---
    function watchAd(type) {
        if (type === 'coins' && getAdCountForToday() >= 10) {
            alert("Daily free coin limits reached! Come back tomorrow.");
            return;
        }

        currentAdAction = type;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('ad-container').style.display = 'flex';
        
        let timeLeft = 5;
        const progressBar = document.getElementById('adBar');
        const adContent = document.getElementById('adContent');
        
        const contentSamples = ["👟 Slam-Dunk Premium Gear", "🥤 Ultra-Hydration Fuel", "🎮 Pixel Court Arena Showcase"];
        adContent.innerText = `🎥 Playing: ${contentSamples[Math.floor(Math.random() * contentSamples.length)]}`;
        
        progressBar.style.transition = 'none';
        progressBar.style.width = '0%';
        setTimeout(() => {
            progressBar.style.transition = 'width 5s linear';
            progressBar.style.width = '100%';
        }, 50);

        const countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                rewardUser();
            }
        }, 1000);
    }

    function rewardUser() {
        document.getElementById('ad-container').style.display = 'none';
        document.getElementById('menu').style.display = 'flex';
        
        if (currentAdAction === 'revive') {
            hasRevivedThisRun = true;
            gameActive = true;
            player.y = canvas.height / 2;
            player.v = 0;
            obstacles = obstacles.filter(o => o.x > player.x + 150 || o.x < player.x - 100);
            document.getElementById('menu').style.display = 'none';
        } else if (currentAdAction === 'coins') {
            coins += 10; // Changed from 25 to 10
            localStorage.setItem('coins', coins);
            incrementAdCount();
            updateHUD();
            alert("Reward Granted! 💰 +10 Coins added!");
        }
        currentAdAction = null;
    }

    // --- Core Game Loops ---
    function displayLeaderboard() {
        const leaderboard = JSON.parse(localStorage.getItem('bballLeaderboard')) || [];
        const boardContainer = document.getElementById('leaderboardContainer');
        let html = `<strong>TOP 5 LEADERBOARD</strong>`;
        
        if (leaderboard.length === 0) {
            html += `<div class="score-entry" style="justify-content: center; color: #aaa; margin-top: 15px;">No records yet!</div>`;
        } else {
            leaderboard.forEach((entry, index) => {
                const isCurrentRun = (!gameActive && score > 0 && entry.score === score && entry.name === nickname);
                const highlightStyle = isCurrentRun ? 'color: var(--primary); font-weight: bold; background: #fdf2e9;' : '';
                html += `
                    <div class="score-entry" style="${highlightStyle} padding: 4px 2px;">
                        <span>${index + 1}. ${entry.name.toUpperCase()}</span>
                        <span>${entry.score} pts</span>
                    </div>`;
            });
        }
        boardContainer.innerHTML = html;
    }

    function startGame() {
        score = 0; obstacleCount = 0; player.y = canvas.height / 2; player.v = 0;
        obstacles = []; coinItems = []; frame = 0; gameActive = true;
        hasRevivedThisRun = false; 
        document.getElementById('menu').style.display = 'none';
    }

    function jump() { if(gameActive) player.v = player.jump; }
    window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'BUTTON') jump(); });
    window.addEventListener('touchstart', (e) => { 
        if(gameActive && e.target.tagName !== 'BUTTON') { e.preventDefault(); jump(); } 
    }, {passive: false});

    // --- Full Court Blueprint Drawing ---
    function drawCourt() {
        const courtStyle = courtThemes[activeCourtKey];
        ctx.fillStyle = courtStyle.court;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = courtStyle.lines;
        ctx.lineWidth = 3;
        
        // Outer Boundary
        ctx.strokeRect(5, 5, canvas.width - 10, canvas.height - 10);
        
        // Center Line Layout
        ctx.beginPath();
        ctx.moveTo(5, canvas.height / 2);
        ctx.lineTo(canvas.width - 5, canvas.height / 2);
        ctx.stroke();
        
        // Center Restraining Circles
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, 40, 0, Math.PI * 2);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, 15, 0, Math.PI * 2);
        ctx.stroke();
        
        // Bottom Paint Area & Key
        ctx.fillStyle = "rgba(255,255,255,0.02)";
        ctx.fillRect(canvas.width / 4, canvas.height - 140, canvas.width / 2, 135);
        ctx.strokeRect(canvas.width / 4, canvas.height - 140, canvas.width / 2, 135);
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height - 140, 45, Math.PI, 0);
        ctx.stroke();
        
        // Top Paint Area & Key
        ctx.fillRect(canvas.width / 4, 5, canvas.width / 2, 135);
        ctx.strokeRect(canvas.width / 4, 5, canvas.width / 2, 135);
        ctx.beginPath();
        ctx.arc(canvas.width / 2, 140, 45, 0, Math.PI);
        ctx.stroke();
        
        // 3-Point Arcs (Subtle Layout Indicators)
        ctx.beginPath();
        ctx.arc(canvas.width / 2, 5, canvas.width * 0.45, 0, Math.PI);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height - 5, canvas.width * 0.45, Math.PI, 0);
        ctx.stroke();
    }

    function update() {
        if (!gameActive) return;
        player.v += player.g; player.y += player.v;
        if (player.y + player.radius > canvas.height || player.y - player.radius < 0) endGame();

        if (frame % 100 === 0) {
            obstacleCount++;
            let gap = 200, h = Math.random() * (canvas.height - gap - 280) + 140; // Clamped tightly to look clean inside a full court
            obstacles.push({ x: canvas.width, h: h, gap: gap, passed: false, id: obstacleCount });
            coinItems.push({ x: canvas.width + 15, y: h + (gap/2), collected: false });
        }

        obstacles.forEach((o, i) => {
            o.x -= 4;
            if (player.x + player.radius > o.x && player.x - player.radius < o.x + 50) {
                if (player.y - player.radius < o.h || player.y + player.radius > o.h + o.gap) endGame();
            }
            if (!o.passed && o.x < player.x) { o.passed = true; score++; }
            if (o.x < -100) obstacles.splice(i, 1);
        });

        coinItems.forEach((c, i) => {
            c.x -= 4;
            let dx = c.x - player.x, dy = c.y - player.y;
            if (Math.sqrt(dx*dx + dy*dy) < player.radius + 10 && !c.collected) {
                c.collected = true; coins++; 
                localStorage.setItem('coins', coins);
                updateHUD();
            }
            if (c.x < -20 || c.collected) coinItems.splice(i, 1);
        });
        frame++;
    }

    function render() {
        drawCourt();
        const ballConfig = ballThemes[activeBallKey];
        const pillarConfig = pillarThemes[activePillarKey];
        
        // Draw custom themed Pillars
        obstacles.forEach(o => {
            ctx.fillStyle = pillarConfig.fill;
            ctx.fillRect(o.x, 0, 50, o.h);
            ctx.fillRect(o.x, o.h + o.gap, 50, canvas.height);
            
            // Draw rim stripes using selected configuration parameters
            ctx.strokeStyle = pillarConfig.rim;
            ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(o.x - 10, o.h); ctx.lineTo(o.x + 60, o.h); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(o.x - 10, o.h + o.gap); ctx.lineTo(o.x + 60, o.h + o.gap); ctx.stroke();
            
            ctx.fillStyle = "white"; ctx.font = "bold 14px Arial";
            ctx.fillText(o.id, o.x + 15, 30);
        });

        ctx.fillStyle = "var(--gold)";
        coinItems.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 9, 0, Math.PI*2); ctx.fill(); });
        
        // Render custom customized ball skin mesh assets
        ctx.fillStyle = ballConfig.primary;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();
        
        ctx.strokeStyle = ballConfig.seam; 
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(player.x - player.radius, player.y); ctx.lineTo(player.x + player.radius, player.y); ctx.stroke();
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.stroke();
        
        update(); 
        requestAnimationFrame(render);
    }

    function endGame() {
        gameActive = false;
        
        let leaderboard = JSON.parse(localStorage.getItem('bballLeaderboard')) || [];
        leaderboard.push({ name: nickname || "Player", score: score });
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard = leaderboard.slice(0, 5);
        localStorage.setItem('bballLeaderboard', JSON.stringify(leaderboard));
        
        if (score > highScore) { 
            highScore = score; 
            localStorage.setItem('bestScore', highScore); 
        }
        
        document.getElementById('lastScore').innerText = score;
        displayLeaderboard();
        checkAdLimit();
        
        const reviveBtn = document.getElementById('btnReviveAd');
        if (!hasRevivedThisRun && score > 0) {
            reviveBtn.style.display = 'flex';
        } else {
            reviveBtn.style.display = 'none';
        }
        
        document.getElementById('menuTitle').innerText = "OUT OF BOUNDS!";
        document.getElementById('menu').style.display = 'flex';
    }
    window.onload = init;
</script>
</body>
</html>
